services:
  postgres:
    image: postgres:16-alpine
    network_mode: host
    command: postgres -p ${DB_PORT:-15432}
    environment:
      POSTGRES_DB: ${DB_NAME:-org_api}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-org_api} -p ${DB_PORT:-15432}
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: ${APP_PORT:-8080}
      DB_HOST: 127.0.0.1
      DB_PORT: ${DB_PORT:-15432}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-org_api}
      DB_SSLMODE: disable

volumes:
  postgres_data:
